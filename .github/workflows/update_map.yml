name: Fetch and Map Bryofungi Data

on:
  workflow_dispatch:
  schedule:
    # Optional: Automatically runs at midnight every Sunday to keep data fresh
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Data Aggregator Script
      run: python fetch_data.py

    - name: Commit and Push Updated Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Check if data.geojson or records files were modified
        if [ -n "$(git status --porcelain)" ]; then
          echo "Changes detected. Committing updated records..."
          git add .
          git commit -m "Automated synchronization of phenology records and archive snapshot"
          git push original main
        else
          echo "No new data changes found. Skipping commit."
        fi
