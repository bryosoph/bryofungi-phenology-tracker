name: Update Phenology Records

on:
  # This triggers the workflow every Sunday at 00:00 UTC
  schedule:
    - cron: '0 0 * * 0'
  
  # This allows you to run it manually from the "Actions" tab in GitHub
  workflow_dispatch:

jobs:
  update-map-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to allow the script to push updates back to your repo
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Fetcher Script
        run: python fetch_data.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # Only commit if data.geojson has actually changed
          git add data.geojson
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Automated update of bryophilous fungi records"
            git push
          else
            echo "No changes detected in biodiversity data."
          fi
