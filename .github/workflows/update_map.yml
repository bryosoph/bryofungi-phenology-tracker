name: Automated Phenology Map Update

on:
  schedule:
    - cron: '0 0 * * 0' # Fires automatically every Sunday at midnight
  workflow_dispatch: # Allows you to manually trigger it via the Actions tab

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Fetcher Pipeline
        run: |
          python fetch_data.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Automation"
          git config --global user.email "actions@github.com"
          git add data.geojson
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Automated synchronization of phenology records"
            git push
          else
            echo "No new biodiversity records found across platforms this week."
          fi
